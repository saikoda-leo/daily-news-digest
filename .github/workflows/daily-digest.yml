name: Daily Digest

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 07:00 ICT every morning
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit output files back to repo

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit & push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "output/$(date -u +'%Y-%m-%d').md" "output/$(date -u +'%Y-%m-%d').html" 2>/dev/null || true
          git diff --cached --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d')"
          git push
