# Daily Info Digest — source configuration

rss_feeds:
  - name: Hacker News
    url: https://news.ycombinator.com/rss
    max_items: 5
  - name: The Verge
    url: https://www.theverge.com/rss/index.xml
    max_items: 5
  - name: VnExpress
    url: https://vnexpress.net/rss/tin-moi-nhat.rss
    max_items: 5
  - name: Tuổi Trẻ
    url: https://tuoitre.vn/rss/tin-moi-nhat.rss
    max_items: 5
  - name: Tinhte.vn
    url: https://tinhte.vn/rss
    max_items: 5

github_trending:
  languages:
    - python
    - ""          # empty string = all languages
  since: daily    # daily | weekly | monthly
  max_repos: 5

subreddits:
  - name: programming
    max_posts: 5
  - name: MachineLearning
    max_posts: 5

summarization:
  enabled: true

output:
  dir: output
